services:
  api:
    image: ghcr.io/bmccord/stacker/stacker-api:${API_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-4100}:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      STACKER_API_KEY: ${STACKER_API_KEY}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_FIRST_NAME: ${SEED_ADMIN_FIRST_NAME:-Admin}
      SEED_ADMIN_LAST_NAME: ${SEED_ADMIN_LAST_NAME:-User}
      APP_VERSION: ${API_IMAGE_TAG:-dev}
      PORT: "4000"

  ui:
    image: ghcr.io/bmccord/stacker/stacker-ui:${UI_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3100}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4100/graphql}

  docs:
    image: ghcr.io/bmccord/stacker/stacker-docs:${DOCS_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${DOCS_PORT:-3101}:80"
