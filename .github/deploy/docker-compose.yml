services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/stacker-api:${API_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD}@${DB_HOST:-db}:3306/${DB_NAME:-stacker}
      JWT_SECRET: ${JWT_SECRET}
      STACKER_API_KEY: ${STACKER_API_KEY}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_FIRST_NAME: ${SEED_ADMIN_FIRST_NAME:-Admin}
      SEED_ADMIN_LAST_NAME: ${SEED_ADMIN_LAST_NAME:-User}
      APP_VERSION: ${API_IMAGE_TAG:-dev}
      PORT: "4000"

  ui:
    image: ghcr.io/${GITHUB_REPOSITORY}/stacker-ui:${UI_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${UI_PORT:-80}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/graphql}

  docs:
    image: ghcr.io/${GITHUB_REPOSITORY}/stacker-docs:${DOCS_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${DOCS_PORT:-3001}:80"
