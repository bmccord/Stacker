services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-devpass123}
      MARIADB_DATABASE: ${DB_NAME:-stacker}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GITHUB_REPO:-your-org/stacker}/stacker-api:${API_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:${DB_ROOT_PASSWORD:-devpass123}@db:3306/${DB_NAME:-stacker}"
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4000"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_ADMIN_FIRST_NAME: ${SEED_ADMIN_FIRST_NAME:-Admin}
      SEED_ADMIN_LAST_NAME: ${SEED_ADMIN_LAST_NAME:-User}
      STACKER_API_KEY: ${STACKER_API_KEY}
    ports:
      - "${API_PORT:-4000}:4000"

  ui:
    image: ghcr.io/${GITHUB_REPO:-your-org/stacker}/stacker-ui:${UI_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/graphql}
    ports:
      - "${UI_PORT:-80}:80"

volumes:
  db-data:
